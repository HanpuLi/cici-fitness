<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cici 健身计划</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>" type="image/svg+xml">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#6b5344">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Restrict web fonts to Latin only — Chinese falls to system fonts immediately */
        @font-face {
            font-family: 'EB Garamond';
            src: local('EB Garamond');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA,
                           U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193,
                           U+2212, U+2215, U+FEFF, U+FFFD;
        }
        @font-face {
            font-family: 'DM Sans';
            src: local('DM Sans');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA,
                           U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193,
                           U+2212, U+2215, U+FEFF, U+FFFD;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>
    <header class="masthead">
        <div class="masthead-seal">咪</div>
        <div>
            <h1>Cici</h1>
            <p class="masthead-sub">健身计划 · Fitness Planner</p>
        </div>
        <div class="masthead-right" style="display:flex;align-items:center;gap:8px">
            <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="切换深色/浅色模式">🌙</button>
            <div id="auth-btn"></div>
        </div>
    </header>

    <div id="universal-timer" class="timer-bar">
        <div class="timer-progress" id="timer-progress"></div>
        <div class="timer-content">
            <div class="timer-left">
                <i class="ti ti-clock"></i>
                <span id="timer-time" style="font-family:var(--font-mono);font-size:18px;font-weight:700;letter-spacing:1px;margin-left:4px">00:00</span>
                <span id="timer-label" style="font-size:11px;opacity:0.8;margin-left:8px;font-weight:500"></span>
            </div>
            <div class="timer-right">
                <button class="timer-btn" onclick="stopTimer()"><i class="ti ti-x"></i> 结束</button>
            </div>
        </div>
    </div>

    <div class="wrap">
        <div class="tabs-wrap">
            <div class="tabs">
                <button class="tab active" onclick="showTab('today',this)">今日训练</button>
                <button class="tab" onclick="showTab('settings',this)">设置</button>
                <button class="tab" onclick="showTab('journal',this)">日志</button>
                <button class="tab" onclick="showTab('stats-tab',this)">统计</button>
            </div>
        </div>

        <!-- Tab: Today -->
        <div class="panel-tab active" id="today">
            <div id="main">
                <div class="empty">
                    <i class="ti ti-barbell"></i>
                    <p>切换到「设置」标签，调整参数后点击生成计划</p>
                </div>
            </div>
        </div>

        <!-- Tab: Settings -->
        <div class="panel-tab" id="settings">
            <div class="panel">
                <p class="panel-title">训练设置 <span class="saved-dot" id="saved-dot"></span></p>
                <p class="sec" style="margin-top:0">专属目标：女性健康薄肌模式 (已锁定)</p>
                
                <p class="sec">当前水平</p>
                <div class="chips" id="g-level">
                    <button class="chip on" data-v="初级">初级</button>
                    <button class="chip" data-v="中级">中级</button>
                    <button class="chip" data-v="高级">高级</button>
                </div>
                <p class="sec">每周训练天数</p>
                <div class="srow">
                    <input type="range" id="sl-days" min="2" max="7" step="1" value="3">
                    <span class="sval" id="v-days">3天</span>
                </div>
                <p class="sec">每次时长</p>
                <div class="srow">
                    <input type="range" id="sl-dur" min="20" max="90" step="5" value="60">
                    <span class="sval" id="v-dur">60分钟</span>
                </div>
                <p class="sec">器材</p>
                <div class="chips" id="g-equip">
                    <button class="chip" data-v="无器材">无器材</button>
                    <button class="chip" data-v="弹力带">弹力带</button>
                    <button class="chip" data-v="哑铃">哑铃</button>
                    <button class="chip on" data-v="健身房全套">健身房全套</button>
                </div>
                <p class="sec">重点部位（可多选）</p>
                <div class="chips" id="g-focus">
                    <button class="chip on" data-v="均衡全身">均衡全身 (无偏好)</button>
                    <button class="chip" data-v="上肢">上肢</button>
                    <button class="chip" data-v="下肢">下肢</button>
                    <button class="chip" data-v="核心">核心</button>
                    <button class="chip" data-v="有氧">有氧</button>
                </div>
                <p class="sec">限制或注意</p>
                <textarea id="limits" placeholder="例如：膝盖不适、肩伤、避免跳跃..."></textarea>
                <div style="display:flex;gap:8px">
                    <button id="gen-btn" onclick="genPlan()" style="flex:1">生成全新计划</button>
                    <button id="recal-btn" onclick="recalibratePlan()" style="flex:1;display:none;background:var(--surface2);color:var(--ink);border:1px solid var(--border)">重排剩余天数</button>
                </div>
            </div>
            <div class="panel">
                <p class="panel-title">数据管理</p>
                <div class="export-row">
                    <button class="exp-btn" onclick="exportForAI()">AI 分析导出</button>
                    <button class="exp-btn" onclick="exportJSON()">备份 JSON</button>
                    <button class="exp-btn" onclick="exportCSV()">导出 CSV</button>
                    <label class="exp-btn" style="cursor:pointer">导入<input type="file" accept=".json"
                            onchange="importJSON(this)" style="display:none"></label>
                </div>
                <div style="margin-top:12px;">
                    <button class="exp-btn" onclick="clearAllData()" style="width:100%;color:var(--terra);border-color:var(--terra-br)">清空所有数据 (恢复出厂)</button>
                </div>
            </div>

        </div>

        <!-- Tab: Journal -->
        <div class="panel-tab" id="journal">
            <div class="panel">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                    <p class="panel-title" style="margin:0">训练日志</p>
                    <button class="exp-btn" id="jrnl-toggle" onclick="toggleLogHistory()">显示全部</button>
                </div>
                <div id="log-list">
                    <div class="empty">
                        <p>完成训练后自动记录</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Stats -->
        <div class="panel-tab" id="stats-tab">
            <div id="stats-content"></div>
        </div>
    </div>

    <div class="sync-toast" id="sync-toast"></div>

    <div id="rpe-modal" class="ex-modal-overlay" onclick="if(event.target===this)closeRpeModal()">
        <div class="ex-modal-card" style="text-align:center" onclick="event.stopPropagation()">
            <h3 id="rpe-modal-title" style="margin-bottom:8px;font-family:var(--font-display);font-size:20px;color:var(--ink)">今日疲劳度评估</h3>
            <p id="rpe-modal-desc" style="margin-bottom:20px;font-size:13px;color:var(--ink3)">打分将影响后续 AI 给出的重量调整建议</p>
            
            <div class="rpe-grid">
                <button class="rpe-btn rpe-low" onclick="submitRPE(1)"><div class="rpe-val">1</div><div class="rpe-lbl">毫无感觉</div></button>
                <button class="rpe-btn rpe-low" onclick="submitRPE(2)"><div class="rpe-val">2</div><div class="rpe-lbl">极度轻松</div></button>
                <button class="rpe-btn rpe-low" onclick="submitRPE(3)"><div class="rpe-val">3</div><div class="rpe-lbl">轻松</div></button>
                <button class="rpe-btn rpe-mid" onclick="submitRPE(4)"><div class="rpe-val">4</div><div class="rpe-lbl">略感疲劳</div></button>
                <button class="rpe-btn rpe-mid" onclick="submitRPE(5)"><div class="rpe-val">5</div><div class="rpe-lbl">适中</div></button>
                <button class="rpe-btn rpe-mid" onclick="submitRPE(6)"><div class="rpe-val">6</div><div class="rpe-lbl">正常训练</div></button>
                <button class="rpe-btn rpe-high" onclick="submitRPE(7)"><div class="rpe-val">7</div><div class="rpe-lbl">偏难</div></button>
                <button class="rpe-btn rpe-high" onclick="submitRPE(8)"><div class="rpe-val">8</div><div class="rpe-lbl">困难</div></button>
                <button class="rpe-btn rpe-max" onclick="submitRPE(9)"><div class="rpe-val">9</div><div class="rpe-lbl">极限</div></button>
                <button class="rpe-btn rpe-max" onclick="submitRPE(10)"><div class="rpe-val">10</div><div class="rpe-lbl">力竭</div></button>
            </div>
            
            <textarea id="rpe-note" class="rpe-note-input" placeholder="有什么想记录的？（选填，如：今天状态不好、卧推加了5kg）"></textarea>
            
            <button class="btn btn-out" style="width:100%;margin-top:16px;font-size:13px" onclick="submitRPE(6, true)">跳过</button>
        </div>
    </div>

    <!-- Exercise Detail Modal -->
    <div id="ex-modal" class="ex-modal-overlay" onclick="closeExDetail()">
        <div class="ex-modal-card" onclick="event.stopPropagation()">
            <div class="ex-modal-hdr">
                <h2 id="ex-modal-title" class="ex-modal-title"></h2>
                <button class="ex-modal-close" onclick="closeExDetail()">&#10005;</button>
            </div>
            <div id="ex-modal-muscles" class="jentry-chips" style="margin-bottom:1rem"></div>
            <p style="font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:8px;letter-spacing:.06em">动作要点</p>
            <div id="ex-modal-steps"></div>
            <div id="ex-modal-tips" style="margin-top:10px"></div>
            <div id="ex-modal-mistakes"></div>
        </div>
    </div>

    <script src="core.js"></script>
    <script src="app.js"></script>
    <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>

</html>
