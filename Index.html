<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cici 健身计划</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>
    <header class="masthead">
        <div class="masthead-seal">咪</div>
        <div>
            <h1>Cici</h1>
            <p class="masthead-sub">健身计划 · Fitness Planner</p>
        </div>
        <div class="masthead-right" id="auth-btn"></div>
    </header>

    <div class="wrap">
        <div class="tabs-wrap">
            <div class="tabs">
                <button class="tab active" onclick="showTab('today',this)">今日训练</button>
                <button class="tab" onclick="showTab('settings',this)">设置</button>
                <button class="tab" onclick="showTab('journal',this)">日志</button>
                <button class="tab" onclick="showTab('stats-tab',this)">统计</button>
            </div>
        </div>

        <!-- Tab: Today -->
        <div class="panel-tab active" id="today">
            <div id="main">
                <div class="empty">
                    <i class="ti ti-barbell"></i>
                    <p>切换到「设置」标签，调整参数后点击生成计划</p>
                </div>
            </div>
        </div>

        <!-- Tab: Settings -->
        <div class="panel-tab" id="settings">
            <div class="panel">
                <p class="panel-title">训练设置 <span class="saved-dot" id="saved-dot"></span></p>
                <p class="sec">目标</p>
                <div class="chips" id="g-goal">
                    <button class="chip on" data-v="减脂塑形">减脂塑形</button>
                    <button class="chip" data-v="增肌力量">增肌力量</button>
                    <button class="chip" data-v="提升耐力">提升耐力</button>
                    <button class="chip" data-v="整体健康">整体健康</button>
                    <button class="chip" data-v="灵活柔韧">灵活柔韧</button>
                </div>
                <p class="sec">当前水平</p>
                <div class="chips" id="g-level">
                    <button class="chip on" data-v="初级">初级</button>
                    <button class="chip" data-v="中级">中级</button>
                    <button class="chip" data-v="高级">高级</button>
                </div>
                <p class="sec">每周训练天数</p>
                <div class="srow">
                    <input type="range" id="sl-days" min="2" max="7" step="1" value="3">
                    <span class="sval" id="v-days">3天</span>
                </div>
                <p class="sec">每次时长</p>
                <div class="srow">
                    <input type="range" id="sl-dur" min="20" max="90" step="5" value="45">
                    <span class="sval" id="v-dur">45分钟</span>
                </div>
                <p class="sec">器材</p>
                <div class="chips" id="g-equip">
                    <button class="chip" data-v="无器材">无器材</button>
                    <button class="chip" data-v="弹力带">弹力带</button>
                    <button class="chip" data-v="哑铃">哑铃</button>
                    <button class="chip on" data-v="健身房全套">健身房全套</button>
                </div>
                <p class="sec">重点部位（可多选）</p>
                <div class="chips" id="g-focus">
                    <button class="chip" data-v="上肢">上肢</button>
                    <button class="chip" data-v="下肢">下肢</button>
                    <button class="chip" data-v="核心">核心</button>
                    <button class="chip" data-v="有氧">有氧</button>
                </div>
                <p class="sec">限制或注意</p>
                <textarea id="limits" placeholder="例如：膝盖不适、肩伤、避免跳跃..."></textarea>
                <button id="gen-btn" onclick="genPlan()">生成计划</button>
            </div>
            <div class="panel">
                <p class="panel-title">数据管理</p>
                <div class="export-row">
                    <button class="exp-btn" onclick="exportForAI()">🤖 AI 分析导出</button>
                    <button class="exp-btn" onclick="exportJSON()">📦 备份 JSON</button>
                    <button class="exp-btn" onclick="exportCSV()">📄 导出 CSV</button>
                    <label class="exp-btn" style="cursor:pointer">📥 导入<input type="file" accept=".json"
                            onchange="importJSON(this)" style="display:none"></label>
                </div>
            </div>

        </div>

        <!-- Tab: Journal -->
        <div class="panel-tab" id="journal">
            <div class="panel">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                    <p class="panel-title" style="margin:0">训练日志</p>
                    <button class="exp-btn" id="jrnl-toggle" onclick="toggleLogHistory()">显示全部</button>
                </div>
                <div id="log-list">
                    <div class="empty">
                        <p>完成训练后自动记录</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Stats -->
        <div class="panel-tab" id="stats-tab">
            <div id="stats-content"></div>
        </div>
    </div>

    <div class="sync-toast" id="sync-toast"></div>

    <!-- Exercise Detail Modal -->
    <div id="ex-modal" class="ex-modal-overlay" onclick="closeExDetail()">
        <div class="ex-modal-card" onclick="event.stopPropagation()">
            <div class="ex-modal-hdr">
                <h2 id="ex-modal-title" class="ex-modal-title"></h2>
                <button class="ex-modal-close" onclick="closeExDetail()">&#10005;</button>
            </div>
            <div id="ex-modal-muscles" class="jentry-chips" style="margin-bottom:1rem"></div>
            <p style="font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:8px;letter-spacing:.06em">动作要点</p>
            <div id="ex-modal-steps"></div>
            <div id="ex-modal-tips" style="margin-top:10px"></div>
            <div id="ex-modal-mistakes"></div>
        </div>
    </div>

    <script src="core.js"></script>
    <script src="app.js"></script>
</body>

</html>
