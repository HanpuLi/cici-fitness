<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="seal-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b84a2e"/>
      <stop offset="50%" stop-color="#c65838"/>
      <stop offset="100%" stop-color="#e07858"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="0" dy="1" result="shifted"/>
      <feFlood flood-color="rgba(0,0,0,0.2)" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle with rich 3-stop gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#seal-bg)"/>

  <!-- Decorative inner rings — seal/stamp motif -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="rgba(247,244,238,0.18)" stroke-width="1"/>
  <circle cx="50" cy="50" r="39" fill="none" stroke="rgba(247,244,238,0.08)" stroke-width="0.5"/>

  <!-- '咪' character — uses platform CJK serif fonts (no web font dependency) -->
  <text x="50" y="54"
        font-family="'Songti SC','STSong','SimSun','Noto Serif CJK SC','Source Han Serif SC',serif"
        font-size="44" font-weight="600"
        fill="#f7f4ee"
        text-anchor="middle"
        dominant-baseline="central"
        filter="url(#glow)">咪</text>
</svg>
